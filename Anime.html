<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OATZA PREMIUM - V.I.P ONLY (REMASTERED)</title>
    <style>
        :root { --main-color: #ff4500; --bg-color: #050505; --card-bg: #111; }
        body { background: var(--bg-color); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 20px; overflow-x: hidden; }
        h1 { color: var(--main-color); text-align: center; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,69,0,0.5); margin-top: 30px; text-transform: uppercase; }
        
        #main-view { padding: 20px; transition: 0.5s; }
        #player-view { display: none; padding: 20px; min-height: 100vh; background: #000; animation: fadeIn 0.5s; }

        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .anime-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .anime-card:hover { transform: translateY(-10px); border-color: var(--main-color); box-shadow: 0 10px 20px rgba(255,69,0,0.3); }
        .anime-card img { width: 100%; height: 250px; object-fit: cover; }
        .anime-card h3 { font-size: 14px; padding: 15px; margin: 0; text-align: center; color: #fff; }

        .video-container { max-width: 1000px; margin: 0 auto; position: relative; padding-bottom: 56.25%; height: 0; border-radius: 15px; overflow: hidden; border: 2px solid #333; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        #back-btn { background: #222; color: white; border: 1px solid var(--main-color); padding: 10px 25px; margin-bottom: 20px; cursor: pointer; border-radius: 50px; font-weight: bold; transition: 0.3s; display: block; margin-left: auto; margin-right: auto; text-transform: uppercase; }
        #back-btn:hover { background: var(--main-color); box-shadow: 0 0 15px var(--main-color); }
        
        .status { text-align: center; color: #666; font-size: 13px; margin-bottom: 30px; text-transform: uppercase; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="main-view">
    <h1>OATZA ULTIMATE V.I.P</h1>
    <div class="status">SYSTEM: AUTO-SYNC WITH MUSE THAILAND (NO ADS)</div>
    
    <div class="anime-grid">
        <div class="anime-card" onclick="openPlayer('UUG8496_Nl8D_vjZAn789_vQ', 'MUSE THAILAND RECENT UPLOADS')">
            <img src="https://images.unsplash.com/photo-1578632292335-df3abbb0d586?auto=format&fit=crop&q=80&w=500" alt="Update">
            <h3>RECENT UPLOADS</h3>
        </div>

        <div class="anime-card" onclick="openPlayer('PLMBf6zPloS_W686-qf_r52_wW-W0Xf0o3', 'THAT TIME I GOT REINCARNATED AS A SLIME')">
            <img src="https://s4.anilist.co/file/anilistcdn/media/anime/cover/large/bx101280-99V99vdf4Z9M.jpg" alt="Slime">
            <h3>TENSEI SHITARA SLIME</h3>
        </div>

        <div class="anime-card" onclick="openPlayer('PLMBf6zPloS_XzE7r2q7uX_14F9U-o_U_A', 'ONE PIECE (MUSE THAILAND)')">
            <img src="https://s4.anilist.co/file/anilistcdn/media/anime/cover/large/nx21-S6pSzd3mme9W.png" alt="One Piece">
            <h3>ONE PIECE</h3>
        </div>
    </div>
</div>

<div id="player-view">
    <button id="back-btn" onclick="closePlayer()">BACK TO MAIN MENU</button>
    <h2 id="current-title" style="color:var(--main-color); text-align: center; margin-bottom: 20px; text-transform: uppercase;"></h2>
    
    <div class="video-container">
        <iframe id="main-player" src="" 
            allow="autoplay; encrypted-media" allowfullscreen>
        </iframe>
    </div>
    
    <p style="text-align: center; color: #444; margin-top: 15px; font-size: 12px; text-transform: uppercase;">
        NICKYHUB LOGIC | SAMSUNG A05S OPTIMIZED
    </p>
</div>

<script>
    const playerView = document.getElementById('player-view');
    const mainView = document.getElementById('main-view');
    const playerFrame = document.getElementById('main-player');
    const titleText = document.getElementById('current-title');

    function openPlayer(playlistID, title) {
        titleText.innerText = "STREAMING: " + title;
        const embedURL = `https://www.youtube.com/embed/videoseries?list=${playlistID}&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3&autoplay=1`;
        playerFrame.src = embedURL;
        mainView.style.display = 'none';
        playerView.style.display = 'block';
        window.scrollTo(0,0);
    }

    function closePlayer() {
        playerFrame.src = "";
        playerView.style.display = 'none';
        mainView.style.display = 'block';
    }
</script>

</body>
</html>
