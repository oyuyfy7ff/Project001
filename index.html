<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>รักหอม 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@700&family=Sriracha&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kalam', 'Sarabun', sans-serif;
            background-color: #fff0f5;
            color: #d81b60;
            text-align: center;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .heart-container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(216, 27, 96, 0.2);
            border: 2px solid #ffb6c1;
            max-width: 90%;
            position: relative;
            animation: heartBeat 1.5s ease-in-out infinite;
            cursor: pointer; /* ทำให้รู้ว่ากดได้ */
            user-select: none; /* กันคลุมดำตอนรัวนิ้ว */
        }

        h1 { font-size: 3rem; margin-bottom: 10px; color: #ff1493; }
        p { font-size: 1.5rem; color: #c71585; margin: 5px 0; }
        
        /* สไตล์ตัวนับเลขแบบผู้เฒ่า (แอบซ่อนไว้บางๆ) */
        #counter {
            font-family: 'Sriracha', cursive;
            font-size: 1rem;
            color: #ffb6c1;
            margin-top: 10px;
        }

        .heart {
            position: absolute;
            color: #ff69b4;
            opacity: 0;
            animation: floatHeart 3s linear infinite;
            pointer-events: none;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes floatHeart {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-150px) rotate(360deg); opacity: 0; }
        }

        @media (max-width: 600px) { h1 { font-size: 2.2rem; } p { font-size: 1.2rem; } }
    </style>
</head>
<body>

    <div class="heart-container" id="gate">
        <h1>รักหอมม 💖</h1>
        <p>หอมน่ารักที่สุดในโลกกก 😍</p>
        <p>🎀 ✨ ✨ 🎀</p>
        <div id="counter">เคาะพิสูจน์รัก: 0</div>
    </div>

    <script>
        let count = 0;
        const target = 20; // ตั้งไว้ 20 ครั้งตามสูตรผู้เฒ่า OATZA
        const gate = document.getElementById('gate');
        const counterDisplay = document.getElementById('counter');

        // ระบบวาร์ปเมื่อเคาะครบ
        gate.addEventListener('click', () => {
            count++;
            counterDisplay.innerText = `อย่าเคาะๆ: ${count}`;
            
            // เอฟเฟกต์สั่นตอนกด
            gate.style.animation = 'none';
            setTimeout(() => { gate.style.animation = 'heartBeat 0.3s ease-in-out'; }, 10);

            if (count >= target) {
                // ผู้เฒ่ามาบอกลาก่อนวาร์ป
                counterDisplay.innerText = "กำลังวาป ...";
                counterDisplay.style.color = "#ff1493";
                
                setTimeout(() => {
                    window.location.href = "anime.html"; // วาร์ปไปหน้าเมนูอนิเมะ
                }, 500);
            }
        });

        // ฟังก์ชันสร้างหัวใจลอย (ของเดิมของพี่)
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
            gate.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 3000);
        }

        setInterval(createHeart, 500);
    </script>

</body>
</html>
